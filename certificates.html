<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificates | Muhammad Saqib</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-glow glow-one"></div>
  <div class="bg-glow glow-two"></div>

  <header class="site-header">
    <a class="logo" href="index.html">MS</a>
    <button class="menu-toggle" aria-label="Open menu">Menu</button>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a class="active" href="certificates.html">Certificates</a>
      <a href="skills.html">Skills</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-head cert-head">
      <p class="eyebrow">Achievements</p>
      <h1>Certificates</h1>
      <p>Verified learning milestones and achievements. Click any certificate to open full-size view.</p>
    </section>

    <section class="cert-grid">
      <button class="cert-card" data-full="assets/certificates/certificate-1.jpeg"><img src="assets/certificates/certificate-1.jpeg" alt="Certificate 1"><span>Certificate 01</span></button>
      <button class="cert-card" data-full="assets/certificates/certificate-2.jpeg"><img src="assets/certificates/certificate-2.jpeg" alt="Certificate 2"><span>Certificate 02</span></button>
      <button class="cert-card" data-full="assets/certificates/certificate-3.jpeg"><img src="assets/certificates/certificate-3.jpeg" alt="Certificate 3"><span>Certificate 03</span></button>
      <button class="cert-card" data-full="assets/certificates/certificate-4.jpeg"><img src="assets/certificates/certificate-4.jpeg" alt="Certificate 4"><span>Certificate 04</span></button>
      <button class="cert-card" data-full="assets/certificates/certificate-5.jpeg"><img src="assets/certificates/certificate-5.jpeg" alt="Certificate 5"><span>Certificate 05</span></button>
      <button class="cert-card" data-full="assets/certificates/certificate-6.jpeg"><img src="assets/certificates/certificate-6.jpeg" alt="Certificate 6"><span>Certificate 06</span></button>
      <button class="cert-card" data-full="assets/certificates/certificate-7.jpeg"><img src="assets/certificates/certificate-7.jpeg" alt="Certificate 7"><span>Certificate 07</span></button>
      <button class="cert-card" data-full="assets/certificates/certificate-8.jpeg"><img src="assets/certificates/certificate-8.jpeg" alt="Certificate 08"><span>Certificate 08</span></button>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" aria-label="Close certificate">Close</button>
    <img id="lightbox-image" src="" alt="Opened certificate">
  </div>

  <script src="script.js"></script>
</body>
</html>
